services:
  postgres:
    image: postgres:17-alpine
    container_name: fiber_boilerplate_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiber_boilerplate
    ports:
      - "6543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiber_network

  fiber_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiber_boilerplate_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fiber_boilerplate
      DB_SSL_MODE: disable
      JWT_SECRET: production-change-this-secret-at-least-32-characters
      PORT: 4000
      ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiber_network

volumes:
  postgres_data:

networks:
  fiber_network:
    driver: bridge
